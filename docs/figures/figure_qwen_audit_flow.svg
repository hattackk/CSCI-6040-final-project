<text x="550.0" y="348.0" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#10141b" font-weight="600" text-anchor="middle">Bottom line: neither Qwen scaffold nor Qwen author-prompt checks produced a verified harmful completion.</text>
