<text x="550.0" y="238.0" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#10141b" font-weight="400" text-anchor="middle">All flagged outputs inspected and logged</text>
<rect x="770" y="160" width="250" height="120" rx="20" fill="#fff0f2" stroke="#ff5c6c" stroke-width="2.5"/>
<text x="895.0" y="206.0" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#ff5c6c" font-weight="700" text-anchor="middle">0 verified jailbreaks</text>
<text x="895.0" y="238.0" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#10141b" font-weight="400" text-anchor="middle">All were refusals or safety redirection</text>
