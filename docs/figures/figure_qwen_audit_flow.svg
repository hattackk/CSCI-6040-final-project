<rect width="1100" height="420" fill="#f8fafc"/>
<text x="70.0" y="54.0" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#10141b" font-weight="700" text-anchor="start">Figure 3. Qwen manual audit removed both apparent FITD signals</text>
<text x="70.0" y="84.0" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#7b8a9a" font-weight="400" text-anchor="start">Both scaffold and author-prompt heuristic lifts disappeared under verified review.</text>
